<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windows Cleaner ULTRA V5 Pro Supertasks (Optimizado para SSD) - Sin Reinicio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom styles for aesthetics */
    body { font-family: 'Inter', sans-serif; margin: 0; background-color: #f0f0f0; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
    h1 { text-align: center; color: #0078d7; margin: 20px 0; font-weight: bold; }
    .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 0 20px; }
    .controls button { padding: 10px 15px; font-size: 15px; border-radius: 6px; border: none; background-color: #0078d7; color: #fff; cursor: pointer; }
    .controls button:hover { background-color: #005a9e; }
    #count { text-align: center; margin: 10px 0; }
    .progress-bar { width: 80%; margin: 0 auto 20px; height: 10px; background: #e0e0e0; border-radius: 5px; overflow: hidden; }
    .progress-bar div { height: 100%; width: 0; background: linear-gradient(to right, #e81123, #ff6b6b); }
    .options { max-height: 400px; overflow-y: auto; margin: 0 auto 20px; width: 90%; background: #fff; border-radius: 8px; padding: 15px; }
    .options details { margin-bottom: 8px; }
    .options summary { font-weight: bold; color: #0078d7; cursor: pointer; }
    .options label { display: flex; align-items: center; margin: 5px 0; }
    .options input { margin-right: 8px; transform: scale(1.2); }
    textarea { width: calc(100% - 40px); height: 360px; margin: 0 auto 20px; padding: 15px; border-radius: 6px; border: 1px solid #ccc; font-family: 'Consolas', monospace; }
    .message-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); color: #fff; padding: 12px 20px; border-radius: 8px; opacity: 0; transition: opacity 0.3s; }
    .message-box.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>Windows Cleaner ULTRA V5 Pro Supertasks (Optimizado para SSD) - Sin Reinicio</h1>
  <div class="controls">
    <button data-action="select-all">Sel. Todo</button>
    <button data-action="deselect-all">Desel. Todo</button>
    <button data-action="gen">Generar</button>
    <button data-action="copy">Copiar</button>
  </div>
  <div class="progress-bar"><div id="progress"></div></div>
  <p id="count">0/0</p>
  <div class="options"></div>
  <textarea id="script" readonly placeholder="El script aparecerá aquí..."></textarea>
  <div id="messageBox" class="message-box"></div>

  <script>
    const sections = [
      // Archivos Temporales y Prefetch
      {cat:'Archivos Temporales', id:'temp-user', lbl:'Limpiar %TEMP% de Usuario', cmd:['Remove-Item "$env:TEMP\\*" -Recurse -Force -ErrorAction SilentlyContinue']},
      {cat:'Archivos Temporales', id:'temp-win', lbl:'Limpiar C:\\Windows\\Temp', cmd:['Remove-Item "C:\\Windows\\Temp\\*" -Recurse -Force -ErrorAction SilentlyContinue']},
      {cat:'Archivos Temporales', id:'prefetch', lbl:'Limpiar Prefetch', cmd:['Remove-Item "C:\\Windows\\Prefetch\\*" -Recurse -Force -ErrorAction SilentlyContinue']},

      // Bloatware
      {cat:'Bloatware', id:'remove-xbox', lbl:'Eliminar Xbox Game Bar', cmd:['Get-AppxPackage Microsoft.XboxGamingOverlay | Remove-AppxPackage -ErrorAction SilentlyContinue']},
      {cat:'Bloatware', id:'remove-sportsbar', lbl:'Eliminar Xbox Game Bar Companion', cmd:['Get-AppxPackage Microsoft.GamingOverlay | Remove-AppxPackage -ErrorAction SilentlyContinue']},
      {cat:'Bloatware', id:'remove-ads', lbl:'Desactivar sugerencias del sistema', cmd:['Reg Delete "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager" /v SubscribedContent-338387Enabled /f']},

      // SSD Optimización
      {cat:'SSD Optimización', id:'disable-defrag', lbl:'Deshabilitar Desfragmentación SSD', cmd:['Disable-ScheduledTask -TaskName "\\Microsoft\\Windows\\Defrag\\ScheduledDefrag"']},
      {cat:'SSD Optimización', id:'enable-trim', lbl:'Habilitar TRIM', cmd:['fsutil behavior set DisableDeleteNotify 0']},
      {cat:'SSD Optimización', id:'disable-sysmain', lbl:'Desactivar SysMain (Superfetch)', cmd:['Stop-Service SysMain -ErrorAction SilentlyContinue; Set-Service SysMain -StartupType Disabled']},
      {cat:'SSD Optimización', id:'disable-search', lbl:'Desactivar Indexación de Búsqueda', cmd:['Stop-Service WSearch -ErrorAction SilentlyContinue; Set-Service WSearch -StartupType Disabled']},

      // Registros y Diagnósticos
      {cat:'Registros', id:'clear-eventlogs', lbl:'Limpiar registros de eventos', cmd:['wevtutil el | Foreach-Object { wevtutil cl $_ }']},
      {cat:'Registros', id:'clear-wer', lbl:'Borrar registros WER', cmd:['Remove-Item "$env:ProgramData\\Microsoft\\Windows\\WER\\*" -Recurse -Force -ErrorAction SilentlyContinue']},

      // Sistema
      {cat:'Sistema', id:'sfc', lbl:'SFC /scannow', cmd:['sfc /scannow']},
      {cat:'Sistema', id:'dism', lbl:'DISM RestoreHealth', cmd:['Dism.exe /Online /Cleanup-Image /RestoreHealth']},
      {cat:'Sistema', id:'powercfg', lbl:'Informe de eficiencia energética', cmd:['powercfg /energy /output "%USERPROFILE%\\energy-report.html"']},
      {cat:'Sistema', id:'cleanup-winsxs', lbl:'Limpieza WinSxS', cmd:['Dism.exe /Online /Cleanup-Image /StartComponentCleanup']},

      // Drivers
      {cat:'Drivers', id:'cleanup-drivers', lbl:'Eliminar controladores antiguos', cmd:['dism.exe /online /cleanup-image /startcomponentcleanup /resetbase']},

      // Aplicaciones de Usuario
      {cat:'Apps', id:'chrome-cache', lbl:'Limpiar cache Chrome', cmd:['Remove-Item "$env:LOCALAPPDATA\\Google\\Chrome\\User Data\\Default\\Cache\\*" -Recurse -Force']},
      {cat:'Apps', id:'firefox-cache', lbl:'Limpiar cache Firefox', cmd:['Remove-Item "$env:APPDATA\\Mozilla\\Firefox\\Profiles\\*\\cache2\\*" -Recurse -Force']},

      // Junk Windows
      {cat:'Junk Windows', id:'clean-store', lbl:'Restablecer cache Microsoft Store', cmd:['wsreset.exe']},
      {cat:'Junk Windows', id:'clean-recent', lbl:'Borrar archivos recientes', cmd:['Clear-ItemProperty -Path "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\RecentDocs" -Name "*"']},

      // Actualizaciones
      {cat:'Actualizaciones', id:'update-windows', lbl:'Actualizar Windows', cmd:['If (-NOT (Get-Module -ListAvailable -Name PSWindowsUpdate)) { Install-Module PSWindowsUpdate -Force -Scope CurrentUser -ErrorAction SilentlyContinue }; Get-WindowsUpdate -AcceptAll -Install -AutoReboot:$false']},
      {cat:'Actualizaciones', id:'update-choco', lbl:'Actualizar apps Chocolatey', cmd:['choco upgrade all -y']}
    ];

    const opts = document.querySelector('.options');
    const scriptArea = document.getElementById('script');
    const countDisplay = document.getElementById('count');
    const progressBar = document.getElementById('progress');
    const messageBox = document.getElementById('messageBox');
    const categories = [...new Set(sections.map(s => s.cat))];

    function renderOptions() {
      opts.innerHTML = '';
      categories.forEach(cat => {
        const details = document.createElement('details'); details.open = true;
        const summary = document.createElement('summary'); summary.textContent = cat;
        details.append(summary);
        sections.filter(s => s.cat === cat).forEach(task => {
          const label = document.createElement('label');
          const input = document.createElement('input'); input.type = 'checkbox'; input.id = task.id; input.checked = true;
          label.append(input, ' ', task.lbl);
          details.append(label);
        });
        opts.append(details);
      });
      updateCount();
    }

    function updateCount() {
      const total = sections.length;
      const sel = sections.filter(s => document.getElementById(s.id)?.checked).length;
      countDisplay.textContent = `${sel}/${total}`;
      progressBar.style.width = `${Math.round((sel/total)*100)}%`;
    }

    function generateScript() {
      const out = [
        '# Windows Cleaner ULTRA V5 Pro Supertasks',
        '# Generado por tu Asistente',
        'if (-not ([Security.Principal.WindowsPrincipal] [Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)) {',
        '  Write-Warning "Ejecutar como Administrador."; Exit;',
        '}',
        ''
      ];
      sections.forEach(task => {
        if (document.getElementById(task.id)?.checked) {
          out.push(`# --- ${task.lbl} ---`, ...task.cmd, '');
        }
      });
      out.push('Write-Host "¡Limpieza y optimización completadas!"');
      scriptArea.value = out.join('\r\n');
      updateCount();
    }

    function copyScript() {
      scriptArea.select(); document.execCommand('copy');
      messageBox.textContent = '¡Copiado!'; messageBox.classList.add('show');
      setTimeout(() => messageBox.classList.remove('show'), 2000);
    }

    document.querySelector('.controls').addEventListener('click', e => {
      const act = e.target.dataset.action;
      if (act === 'select-all') sections.forEach(s => document.getElementById(s.id).checked = true);
      if (act === 'deselect-all') sections.forEach(s => document.getElementById(s.id).checked = false);
      if (act === 'gen') { generateScript(); return; }
      if (act === 'copy') { copyScript(); return; }
      updateCount();
    });

    renderOptions(); opts.addEventListener('change', e => e.target.type === 'checkbox' && updateCount());
  </script>
</body>
</html>
